backend:
  name: git-gateway
  branch: master

locale: zh_Hant
media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:

  # ── 活動管理 ──
  - name: "events"
    label: "📢 活動管理"
    files:
      - label: "所有活動"
        name: "events_list"
        file: "_data/events.json"
        fields:
          - label: "活動列表"
            name: "list"
            widget: "list"
            fields:
              - { label: "活動標題", name: "title", widget: "string" }
              - { label: "副標題／說明", name: "subtitle", widget: "string", required: false }
              - { label: "標籤（限時／長期／公平服）", name: "tag", widget: "string", required: false }
              - { label: "連結頁面", name: "link", widget: "string" }
              - { label: "日期", name: "date", widget: "date", format: "YYYY-MM-DD" }
              - { label: "置頂顯示", name: "pin", widget: "boolean", default: false }
              - { label: "圖片網址（選填）", name: "img", widget: "string", required: false }

  # ── 版本倍率 ──
  - name: "settings"
    label: "⚙️ 網站設定"
    files:
      - label: "版本倍率"
        name: "rates"
        file: "_data/rates.json"
        fields:
          - { label: "遊戲版本", name: "version", widget: "string" }
          - { label: "手動經驗倍率（×）", name: "manual_exp", widget: "number", value_type: "int" }
          - { label: "內掛經驗倍率（×）", name: "auto_exp", widget: "number", value_type: "int" }
          - { label: "金幣倍率（倍）", name: "gold", widget: "number", value_type: "int" }
          - { label: "掉落倍率（×）", name: "drop", widget: "number", value_type: "int" }
          - { label: "武防強化倍率（倍）", name: "enhance", widget: "number", value_type: "int" }
          - { label: "正義倍率（倍）", name: "justice", widget: "number", value_type: "int" }
          - { label: "負重倍率（倍）", name: "weight", widget: "number", value_type: "int" }
          - { label: "寵物倍率（×）", name: "pet", widget: "number", value_type: "int" }
